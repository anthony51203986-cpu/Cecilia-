name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Inject API Keys
        run: |
          # Groq Keys
          sed -i "s|GROQ_API_KEY_PLACEHOLDER|${{ secrets.GROQ_API_KEY }}|g" index.html
          sed -i "s|SCOUT_API_KEY_PLACEHOLDER|${{ secrets.SCOUT_API_KEY }}|g" index.html
          
          # Cerebras 
          sed -i "s|CEREBRAS_API_KEY_PLACEHOLDER|${{ secrets.CEREBRAS_API_KEY }}|g" index.html
          
          # Open router 
          sed -i "s|OPENROUTER_API_KEY_PLACEHOLDER|${{ secrets.OPENROUTER_API_KEY }}|g" index.html
          
          # Mistral AI
          sed -i "s|MISTRAL_API_KEY_PLACEHOLDER|${{ secrets.MISTRAL_API_KEY }}|g" index.html
          
          # Tavily
          sed -i "s|TAVILY_API_KEY_PLACEHOLDER|${{ secrets.TAVILY_API_KEY }}|g" index.html
  
          
          
          # Wolfram
          sed -i "s|WOLFRAM_APP_ID_PLACEHOLDER|${{ secrets.WOLFRAM_APP_ID }}|g" index.html
          
      
          echo "✅ Groq API key injected"
          echo "✅ Scout API key injected"
          echo "✅ Cerebras API key injected"
          echo "✅ Open router API key injected"
          echo "✅ Mistral API key injected"
          echo "✅ Tavily API key injected"
          
          
          echo "✅ Wolfram App ID injected"
  
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
